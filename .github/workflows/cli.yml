name: CLI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: astral-sh/setup-uv@v5
      - name: Validate OpenAPI spec
        run: npx --yes @openapitools/openapi-generator-cli validate -i docs/openapi/openapi.yaml
      - name: Install CLI dependencies
        working-directory: cli
        run: uv sync --extra dev
      - name: Run tests
        working-directory: cli
        run: uv run pytest
      - name: Run ruff
        working-directory: cli
        run: uv run ruff check .
      - name: Run ty
        working-directory: cli
        run: uv run ty check
